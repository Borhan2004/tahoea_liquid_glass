name: tahoea_liquid_glass
description: >-
  A Flutter widget that faithfully replicates the iOS 18 "Liquid Glass" material —
  deep frosted blur, dual animated waves, iridescent border, specular sweep shimmer,
  radial gloss highlight, and multi-layer floating shadow.
version: 0.0.9
homepage: https://github.com/Borhan2004/tahoea_liquid_glass

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
